<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login</title>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
  <header><strong>Personal Budget Tracker</strong></header>
  <div class="container">
    <div class="card">
      <h2>Login</h2>
      <p id="msg" style="color:red;"></p>
      <form id="loginForm">
        <div>
          <label>Email</label>
          <input id="email" type="text" placeholder="Enter your email" required>
          <span id="errorEmail" style="color:red;font-size:12px;"></span>
        </div>
        <div>
          <label>Password</label>
          <input id="password" type="password" placeholder="Enter your password" required>
          <span id="errorPassword" style="color:red;font-size:12px;"></span>
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Login</button>
          <a href="./register.html">Register instead</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const emailReg = /^(.+)@([^\.].*)\.([a-z]{2,})$/;

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      let valid = true;

      document.getElementById("errorEmail").textContent    = "";
      document.getElementById("errorPassword").textContent = "";
      document.getElementById("msg").textContent           = "";

      if (!emailReg.test(email)) {
        document.getElementById("errorEmail").textContent = "Enter a valid email";
        valid = false;
      }

      if (!password) {
        document.getElementById("errorPassword").textContent = "Enter your password";
        valid = false;
      }

      if (!valid) return;

      try {
        const res = await fetch("http://localhost:3000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          document.getElementById("msg").textContent = data.error;
        } else {
          window.location.href = "./index.html";
        }
      } catch (err) {
        document.getElementById("msg").textContent = "Could not connect to server.";
      }
    });
  </script>
</body>
</html>
