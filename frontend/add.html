<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Transaction</title>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
  <header>
    <strong>Add Transaction</strong>
    <a class="btn btn-ghost" href="./index.html">Back</a>
  </header>

  <div class="container">
    <div class="card">
      <form id="addForm">
        <div>
          <label>Type</label>
          <select name="type" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div>
          <label>Category</label>
          <input name="category" placeholder="e.g., Food, Rent, Job" required>
        </div>
        <div>
          <label>Amount</label>
          <input name="amount" type="number" step="0.01" min="0.01" required>
        </div>
        <div>
          <label>Date</label>
          <input name="date" type="date" required>
        </div>
        <div>
          <label>Description</label>
          <input name="desc" placeholder="Optional note">
        </div>
        <button class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>

  <script>
    document.querySelector("form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const type     = document.querySelector("[name='type']").value;
      const category = document.querySelector("[name='category']").value.trim();
      const amount   = parseFloat(document.querySelector("[name='amount']").value);
      const date     = document.querySelector("[name='date']").value;
      const desc     = document.querySelector("[name='desc']").value.trim();

      if (!category) { alert("Please enter a category."); return; }
      if (!amount || amount <= 0) { alert("Please enter a valid amount."); return; }
      if (!date) { alert("Please select a date."); return; }

      try {
        const res = await fetch("http://localhost:3000/api/transactions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type, category, amount, transaction_date: date, description: desc })
        });
        if (!res.ok) throw new Error("Failed to save");
        window.location.href = "./index.html";
      } catch (err) {
        alert("Error saving transaction: " + err.message);
      }
    });
</script>
</body>
</html>
