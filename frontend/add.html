<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Add Transaction</title>
  <link rel="stylesheet" href="./css/style.css"/>
</head>
<body>
  <header>
    <strong>Add Transaction</strong>
    <a class="btn btn-ghost" href="./index.html">Back</a>
  </header>

  <div class="container">
    <div class="card">
      <form id="addForm">
        <div>
          <label>Type</label>
          <select name="type" id="typeSelect" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div>
          <label>Category</label>
          <select name="category" id="categorySelect" required>
          </select>
        </div>
        <div>
          <label>Amount</label>
          <input name="amount" type="number" step="0.01" min="0.01" required>
        </div>
        <div>
          <label>Date</label>
          <input name="date" type="date" required>
        </div>
        <div>
          <label>Description</label>
          <input name="desc" placeholder="Optional note">
        </div>
        <button class="btn btn-primary" type="submit">Save</button>
      </form>
    </div>
  </div>

  <script>
    const expenseCategories = ["Food", "Rent", "Transport", "Entertainment", "Grocery", "Apparel", "Other"];
    const incomeCategories  = ["Salary", "Freelance", "Investment", "Part-Time Job", "Other"];

    const typeSelect     = document.getElementById("typeSelect");
    const categorySelect = document.getElementById("categorySelect");

    function updateCategories() {
      const cats = typeSelect.value === "income" ? incomeCategories : expenseCategories;
      categorySelect.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join("");
    }

    updateCategories();

    typeSelect.addEventListener("change", updateCategories);

    document.getElementById("addForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const type     = typeSelect.value;
      const category = categorySelect.value;
      const amount   = parseFloat(document.querySelector("[name='amount']").value);
      const date     = document.querySelector("[name='date']").value;
      const desc     = document.querySelector("[name='desc']").value.trim();

      if (!amount || amount <= 0) { alert("Please enter a valid amount."); return; }
      if (!date) { alert("Please select a date."); return; }

      try {
        const res = await fetch("http://localhost:3000/api/transactions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type, category, amount, transaction_date: date, description: desc })
        });
        if (!res.ok) throw new Error("Failed to save");
        window.location.href = "./index.html";
      } catch (err) {
        alert("Error saving transaction: " + err.message);
      }
    });
  </script>
</body>
</html>
